name: zava-agent-config
version: 6.0.0
description: >-
  Zava Engineering — central agent configuration marketplace. Seven plugins in
  three tiers: cross-cutting baseline (secure-baseline) + five SDLC phase kits
  (ideate / code / review / release / operate) + one accelerator (modernize-kit
  for episodic framework migrations). Every Zava service repo composes the
  baseline + selected kits via apm.yml; accelerators are pinned only when
  running an X→Y migration.
author: Zava Engineering
license: MIT
keywords:
  - agentic-sdlc
  - apm
  - zava
  - reference
  - marketplace

dependencies:
  apm: []
  mcp: []

includes: auto

# Org policy DevExpGbb/.github/apm-policy.yml mandates source_attribution.
# Library repo complies even though it has no compilation target itself —
# eat-your-own-dogfood: every Zava repo, library or consumer, follows the rule.
compilation:
  source_attribution: true

# ─────────────────────────────────────────────────────────────────────────────
# Marketplace — see PLATFORM.md §6.1 (Layer A SDLC ribbon).
# Consumers can pin individual kits or the whole marketplace.
# Build metadata (tag_pattern) is APM-only; stripped at compile time.
# ─────────────────────────────────────────────────────────────────────────────
marketplace:
  owner:
    name: Zava Engineering
    url: https://github.com/DevExpGbb/zava-agent-config
  build:
    tagPattern: "v{version}"
  packages:
    - name: secure-baseline
      source: ./plugins/secure-baseline
      description: Cross-cutting baseline — secure-coding instructions, docs style guide, security reviewer persona. Every Zava service pins this.
    - name: ideate-kit
      source: ./plugins/ideate-kit
      description: IDEATE stage — meeting-to-issue skill (transcript / voice / ticket → well-formed GitHub issue).
    - name: code-kit
      source: ./plugins/code-kit
      description: CODE stage — architect persona for design-intent guidance during local authoring.
    - name: review-kit
      source: ./plugins/review-kit
      description: REVIEW stage — pre-PR self-review skills. Multi-perspective panel review (architect + security) of staged changes, run by the author before push.
    - name: release-kit
      source: ./plugins/release-kit
      description: RELEASE stage — CI/CD golden paths instructions (reusable workflows, deploy gates, environment promotion).
    - name: operate-kit
      source: ./plugins/operate-kit
      description: OPERATE stage — incident-to-PR skill (Azure SRE Agent finding → scoped remediation pull request).
    - name: modernize-kit
      source: ./plugins/modernize-kit
      description: ACCELERATOR — framework / runtime modernization. Episodic, opt-in skills (Express 4→5 ships in v6.0.0; Next, React, Spring, Java on the roadmap). Pin only when running a migration. NOT a phase kit — does not compound.
