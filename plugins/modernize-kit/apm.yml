# Per-plugin apm.yml — enables `apm pack --offline --archive` from this
# directory to produce a Claude Code plugin tarball for GitHub Releases
# distribution. Source of truth for runtime metadata is
# .claude-plugin/plugin.json; keep `version` in sync with the top-level
# marketplace (zava-agent-config v6.0.0).
name: modernize-kit
version: 6.0.0
description: >-
  ACCELERATOR — framework / runtime modernization. Episodic, opt-in skills that audit a codebase against an X→Y framework migration, classify findings (SAFE / AUTOFIX / MANUAL), and emit a phased migration plan. NOT a phase kit — does not compound; pin only when running a migration.
author: Zava Engineering
license: MIT

# Zero transitive APM deps — intentional. Consumers explicitly pin
# secure-baseline alongside this kit. See CATALOG.md "Consumption patterns".
dependencies:
  apm: []

# Mirror org policy compliance (DevExpGbb/.github/apm-policy.yml).
compilation:
  source_attribution: true
