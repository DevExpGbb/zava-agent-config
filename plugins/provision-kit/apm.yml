# Per-plugin apm.yml — enables `apm pack --offline --archive` from this
# directory to produce a Claude Code plugin tarball for GitHub Releases
# distribution. Source of truth for runtime metadata is
# .claude-plugin/plugin.json; keep `version` in sync with the top-level
# marketplace (zava-agent-config v6.2.0).
name: provision-kit
version: 6.2.0
description: >-
  PROVISION phase (Day-0) of the Zava Agentic SDLC ribbon. provision-golden-path skill — gathers service details conversationally, files the governed request through the platform IssueOps front door, watches the run live, verifies the new repo and live URL, and explains the guardrails applied.
author: Zava Engineering
license: MIT

# Zero transitive APM deps — intentional. The cross-cutting baseline
# (secure-baseline) is NOT redeclared here so consumers cannot accidentally
# rely on transitive resolution to satisfy their security floor. See
# zava-agent-config CATALOG.md "Consumption patterns" for the rationale.
dependencies:
  apm: []

# Mirror org policy compliance (DevExpGbb/.github/apm-policy.yml).
compilation:
  source_attribution: true
