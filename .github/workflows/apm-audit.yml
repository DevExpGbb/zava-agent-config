name: apm-audit

# Reusable workflow shipped by zava-agent-config for downstream APM consumers.
#
# This file is NOT meant to run on this repo's own push/PR — that's what
# self-audit.yml is for (it adds the marketplace pack/drift check that's
# unique to the publisher). This file exists purely as a `workflow_call`
# artifact that consumers pin and call:
#
#   jobs:
#     audit:
#       uses: DevExpGbb/zava-agent-config/.github/workflows/apm-audit.yml@v3.0.0
#
# Pinning the workflow to a tag means the consumer's audit step is part of
# the supply chain they audit — no implicit "latest" reusable workflow.

on:
  workflow_call:
    inputs:
      fail-on-warn:
        description: "Treat WARNING severity as failure (recommended for prod services)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: APM audit (drift + supply-chain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install APM CLI
        run: |
          curl -sSL https://aka.ms/apm-unix | APM_INSTALL_DIR="$HOME/.local/bin" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify APM CLI
        run: apm --version

      # Detect whether this repo declares APM deps. If not (e.g., zava-agent-config
      # itself), audit is a no-op success and we skip the rest.
      - name: Detect APM dependencies
        id: detect
        run: |
          if [ -f apm.yml ] && grep -qE '^\s*apm:\s*$' apm.yml && \
             ! grep -qE '^\s*apm:\s*\[\s*\]\s*$' apm.yml; then
            echo "has_deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deps=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No APM dependencies declared — audit is a no-op."
          fi

      - name: APM install (populate cache for drift replay)
        if: steps.detect.outputs.has_deps == 'true'
        run: apm install

      - name: APM audit (CI mode)
        if: steps.detect.outputs.has_deps == 'true'
        id: audit
        run: |
          echo "::group::Running apm audit --ci"
          apm audit --ci -f sarif -o apm-audit.sarif
          echo "::endgroup::"

      - name: Upload audit report as artifact
        if: always() && hashFiles('apm-audit.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: apm-audit-report
          path: apm-audit.sarif
          retention-days: 30

      - name: Summarize on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "## 🛡️ APM Audit"
            echo ""
            if [ "${{ steps.detect.outputs.has_deps }}" = "true" ]; then
              echo "Ran \`apm audit --ci\` against project policy (org: \`DevExpGbb/.github/apm-policy.yml\`)."
              echo ""
              echo "SARIF report uploaded as artifact: **apm-audit-report**."
            else
              echo "No APM dependencies declared in \`apm.yml\` — audit skipped."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
