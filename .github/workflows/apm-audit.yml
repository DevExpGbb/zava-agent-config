name: apm-audit

# Reusable workflow shipped by zava-agent-config for downstream APM consumers.
#
# This file is NOT meant to run on this repo's own push/PR — that's what
# self-audit.yml is for (it adds the marketplace pack/drift check that's
# unique to the publisher). This file exists purely as a `workflow_call`
# artifact that consumers pin and call:
#
#   jobs:
#     audit:
#       uses: DevExpGbb/zava-agent-config/.github/workflows/apm-audit.yml@v5.0.1
#
# Pinning the workflow to a tag means the consumer's audit step is part of
# the supply chain they audit — no implicit "latest" reusable workflow.
#
# v5.0.1+: this workflow uses microsoft/apm-action@v1 for CLI install and
# audit. The action handles install + audit + SARIF emission in one step
# and auto-forwards github.token as GITHUB_APM_PAT for same-org private deps.

on:
  workflow_call:
    inputs:
      fail-on-warn:
        description: "Treat WARNING severity as failure (recommended for prod services)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: APM audit (drift + supply-chain)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect whether this repo declares APM deps. If not (e.g., a marketplace-
      # only repo with `apm: []`), audit is a no-op success and we skip
      # apm-action entirely. apm-action expects deps to install/audit.
      - name: Detect APM dependencies
        id: detect
        run: |
          if [ -f apm.yml ] && grep -qE '^\s*apm:\s*$' apm.yml && \
             ! grep -qE '^\s*apm:\s*\[\s*\]\s*$' apm.yml; then
            echo "has_deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deps=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No APM dependencies declared — audit is a no-op."
          fi

      - name: Install + audit via microsoft/apm-action
        if: steps.detect.outputs.has_deps == 'true'
        uses: microsoft/apm-action@v1
        with:
          # Default behavior: apm install + audit. SARIF + step summary auto-emitted.
          audit-report: true

      - name: Summarize on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "## 🛡️ APM Audit"
            echo ""
            if [ "${{ steps.detect.outputs.has_deps }}" = "true" ]; then
              echo "Ran \`apm audit --ci\` against project policy via \`microsoft/apm-action@v1\`."
              echo "(Org policy resolved from \`DevExpGbb/.github/apm-policy.yml\`.)"
              echo ""
              echo "SARIF report uploaded by apm-action; see job logs and Code scanning tab."
            else
              echo "No APM dependencies declared in \`apm.yml\` — audit skipped."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
