name: Platform auth smoke (OIDC)

# Proves the secretless platform identity works end-to-end in CI: the
# `zava-platform-provisioner` SP, federated to this repo's `platform`
# environment, logs in via OIDC and can read the subscription. No secrets.
# Run this after wiring the platform identity to confirm the Azure half is green.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  azure-oidc:
    name: Azure OIDC login (no secret)
    runs-on: ubuntu-latest
    environment: platform
    steps:
      - name: Azure login (OIDC, federated)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify identity + subscription access
        run: |
          az account show -o table
          echo "### 🟢 Platform identity authenticated via OIDC (no stored secret)" >> "$GITHUB_STEP_SUMMARY"
