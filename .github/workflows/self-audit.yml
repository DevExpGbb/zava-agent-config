name: self-audit

# zava-agent-config eats its own dog food: every push and PR runs apm install
# + apm audit --ci to prove the lib's own primitives, lockfile, and (future)
# marketplace bundle are reproducible and drift-free.
#
# This is the lib equivalent of the reusable apm-audit.yml that consumers call.
# If this fails, downstream consumers cannot trust the v* tag we publish.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  self-audit:
    name: Self-audit (apm install + audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install APM CLI
        run: |
          curl -sSL https://raw.githubusercontent.com/danielmeppiel/awd-cli/main/install.sh | bash
          echo "$HOME/.apm/bin" >> "$GITHUB_PATH"

      - name: Verify APM CLI
        run: apm --version

      - name: APM install (resolve + deploy own primitives)
        run: |
          echo "::group::apm install"
          apm install
          echo "::endgroup::"

      - name: Verify lockfile present and tracked
        run: |
          if [ ! -f apm.lock.yaml ]; then
            echo "::error::apm.lock.yaml missing after install. Did install fail?"
            exit 1
          fi
          if git diff --exit-code -- apm.lock.yaml; then
            echo "Lockfile in sync with committed copy."
          else
            echo "::error::apm.lock.yaml drift detected vs committed copy. Run 'apm install' locally and commit the result."
            git diff -- apm.lock.yaml
            exit 1
          fi

      - name: APM audit (CI mode — drift + supply chain)
        run: |
          echo "::group::apm audit --ci"
          apm audit --ci -f sarif -o apm-audit.sarif
          echo "::endgroup::"

      - name: Upload audit report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apm-self-audit-sarif
          path: apm-audit.sarif
          if-no-files-found: warn

      - name: Step summary
        if: always()
        run: |
          {
            echo "## APM self-audit"
            echo ""
            echo "- **Lib**: \`zava-agent-config\`"
            echo "- **Commit**: \`${GITHUB_SHA::7}\`"
            echo "- **Lockfile**: $( [ -f apm.lock.yaml ] && echo 'present + tracked' || echo 'MISSING' )"
            echo "- **Audit report**: \`apm-audit.sarif\` (artifact)"
          } >> "$GITHUB_STEP_SUMMARY"
