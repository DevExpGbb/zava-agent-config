name: release

# Triggered on v* tag push. Three concerns:
#
#  1. Zava-specific gate: agentskills.io spec validation via `gh skill publish
#     --dry-run` — runs ONCE on the tagged ref before any pack work.
#  2. Standard APM release umbrella: `microsoft/apm-action@v1` with
#     `mode: release` handles version-alignment gate, marketplace.json drift
#     check, per-package matrix pack with sha256 sidecars, prerelease
#     auto-detection (from `-rc`/`-alpha`/`-beta`/`-pre` suffix), and `gh
#     release create` publish with all tarballs + the marketplace bundle.
#  3. Distribution: tarballs land on the GH Release; consumers continue to
#     resolve via the APM marketplace (`@vX.Y.Z`).
#
# To cut a release locally:
#   git tag v6.1.1 && git push origin v6.1.1
# CI handles the rest.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to create releases + upload assets

jobs:
  validate-skills:
    name: Validate skills against agentskills.io spec
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate skills against agentskills.io spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # gh skill (preview) ships in gh CLI v2.90+. Upgrade if missing.
          if ! gh skill --help &>/dev/null; then
            echo "gh skill not available, upgrading gh CLI..."
            sudo install -dm 755 /etc/apt/keyrings
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
            sudo chmod 644 /etc/apt/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install gh -y
          fi
          gh --version | head -1

          # Validate every kit that ships skills. APM author layout buries
          # skills under .apm/skills/ — pointing gh skill at .apm/ as the
          # discovery root surfaces them via the standard skills/<name>/SKILL.md
          # pattern. Warnings (secret scanning, tag protection rulesets) are
          # tracked separately; only spec-level errors fail the build.
          failed=0
          validated=0
          for d in plugins/*/.apm; do
            [ -d "$d/skills" ] || continue
            kit=$(basename "$(dirname "$d")")
            echo "::group::Validating $kit against agentskills.io spec"
            if ! gh skill publish --dry-run "$d"; then
              echo "::error::Skill spec validation failed for $kit"
              failed=1
            fi
            validated=$((validated + 1))
            echo "::endgroup::"
          done

          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more kits failed agentskills.io spec validation"
            exit 1
          fi
          echo "$validated kit(s) validated against agentskills.io spec ✓"

  release:
    name: Release (mode:release umbrella)
    needs: validate-skills
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: APM release umbrella
        id: apm
        uses: microsoft/apm-action@v1
        with:
          mode: release
          release-tag: ${{ github.ref_name }}
          release-name: zava-agent-config ${{ github.ref_name }}
          release-prerelease: auto
          release-notes: |
            ## zava-agent-config ${{ github.ref_name }}

            Plugins shipped as Claude Code plugin tarballs in three tiers
            (baseline + phase kits + accelerators). Consumers resolve via APM
            marketplace (`@${{ github.ref_name }}`) or download tarballs below
            for direct Claude Code marketplace installation.

            Verify any tarball:
            ```bash
            sha256sum -c <plugin>-<version>.tar.gz.sha256
            ```

            See auto-generated commit notes below for changes since the previous tag.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report packed plugins
        run: |
          echo "Released ${{ github.ref_name }}"
          echo "Packages: ${{ steps.apm.outputs.packages }}"
          echo "Marketplace drift: ${{ steps.apm.outputs.marketplace-drift }}"
          echo "Release URL: ${{ steps.apm.outputs.release-url }}"
