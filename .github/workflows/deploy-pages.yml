name: Deploy IDP site to GitHub Pages

# Re-runs on any change to the site itself OR to the marketplace data the
# site reads (marketplace.json, plugins, top-level apm.yml). That is what
# makes the catalog automatically reflect repo changes.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.claude-plugin/**'
      - 'plugins/**'
      - 'apm.yml'
      - '.github/workflows/deploy-pages.yml'
  # Daily rebuild so changes to the org policy at DevExpGbb/.github/apm-policy.yml
  # (which the policy page renders live at build time) get picked up even when
  # this repo hasn't changed.
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
